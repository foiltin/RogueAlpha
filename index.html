<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RogueAlpha • Crypto Screener</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>

     body {
            background-image: 
     url('pppp.jpg');
            background-repeat: repeat;
        }
    
       body  { font-family: 'Segoe UI', system-ui, sans-serif; }
        .coin-row:hover { background-color: #1f2937; }
        th { cursor: pointer; user-select: none; position: relative; }
        th:hover { color: white; }
        .sort-asc::after { content: ' ↑'; }
        .sort-desc::after { content: ' ↓'; }

        .rogue-glow {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -0.04em;
            background: linear-gradient(90deg, #c4b5fd, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 35px rgba(167, 139, 250, 0.6);
        }

        .strong-glow {
            box-shadow: 0 0 8px #10b981;
            border-color: #10b981 !important;
        }
        .strong-glow-short {
            box-shadow: 0 0 8px #ef4444;
            border-color: #ef4444 !important;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-violet-600 to-fuchsia-500 rounded-2xl flex items-center justify-center text-3xl font-black">RA</div>
                <div>
                    <h1 class="rogue-glow">RogueAlpha</h1>
                    <p class="text-violet-400 text-sm tracking-widest -mt-1">FIND THE EDGE</p>
                </div>
            </div>
            <button onclick="refreshData()" class="px-6 py-3 bg-violet-600 hover:bg-violet-700 rounded-2xl flex items-center gap-3 font-medium">
                <i class="fas fa-sync"></i> Refresh
            </button>
        </header>

        <!-- HOT LONGS & SHORTS -->
        <div class="mb-12 space-y-12">
            <div>
                <div class="flex items-center gap-3 mb-5">
                    <i class="fas fa-arrow-trend-up text-emerald-500 text-3xl"></i>
                    <h2 class="text-3xl font-bold text-emerald-400">Hot Longs</h2>
                </div>
                <div id="hot-longs" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>
            </div>

            <div>
                <div class="flex items-center gap-3 mb-5">
                    <i class="fas fa-arrow-trend-down text-red-500 text-3xl"></i>
                    <h2 class="text-3xl font-bold text-red-400">Hot Shorts</h2>
                </div>
                <div id="hot-shorts" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>
            </div>
        </div>

        <!-- Market Overview -->
        <div class="bg-gray-900 rounded-3xl overflow-hidden border border-gray-700">
            <div class="p-6 border-b border-gray-700 flex items-center justify-between bg-gray-950">
                <h2 class="text-2xl font-semibold">Market Overview • Top 500 by Market Cap</h2>
                <input type="text" id="search-input" onkeyup="filterTable()" placeholder="Search coins..." 
                       class="bg-gray-800 border border-gray-600 rounded-2xl px-6 py-3 w-80 focus:outline-none focus:border-violet-500">
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full" id="crypto-table">
                    <thead>
                        <tr class="bg-gray-950 text-gray-400 text-sm">
                            <th class="text-left p-5">#</th>
                            <th onclick="sortTable(1)" class="text-left p-5">Coin</th>
                            <th onclick="sortTable(2)" class="text-right p-5">Price</th>
                            <th onclick="sortTable(3)" class="text-right p-5">24h %</th>
                            <th onclick="sortTable(4)" class="text-right p-5">RSI</th>
                            <th onclick="sortTable(5)" class="text-right p-5">Volume 24h</th>
                            <th onclick="sortTable(6)" class="text-right p-5">Market Cap</th>
                            <th onclick="sortTable(7)" class="text-center p-5">Signal</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-800 text-sm"></tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="p-6 border-t border-gray-700 flex justify-center gap-2 flex-wrap" id="pagination"></div>
        </div>

        <footer class="text-center text-gray-500 text-xs mt-12">
            RogueAlpha • Data from CoinGecko
        </footer>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="bg-gray-900 rounded-3xl w-full max-w-2xl mx-4 overflow-hidden">
            <div class="p-6 border-b border-gray-700 flex justify-between items-center" id="modal-header"></div>
            <div class="p-6">
                <canvas id="price-chart" height="150"></canvas>
            </div>
            <div class="grid grid-cols-2 gap-6 p-6 border-t border-gray-700 text-sm" id="modal-details"></div>
            <div class="p-6 border-t border-gray-700 text-center">
                <button onclick="closeModal()" class="px-8 py-3 bg-gray-700 hover:bg-gray-600 rounded-2xl">Close</button>
            </div>
        </div>
    </div>

    <script>
        let allCoins = [];
        let filteredCoins = [];
        let currentPage = 1;
        const coinsPerPage = 100;
        let priceChart = null;
        let currentSort = { col: 3, asc: false };

        const stablecoins = new Set(['usdt','usdc','dai','tether','usd-coin','busd','frax','usde','pyusd']);

        async function fetchCryptoData() {
            try {
                let allData = [];
                // Page 1
                let res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=1&sparkline=false&price_change_percentage=24h');
                allData = await res.json();
                // Page 2
                res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=2&sparkline=false&price_change_percentage=24h');
                const page2 = await res.json();
                allData = allData.concat(page2);

                allCoins = allData.filter(coin => coin.market_cap > 30000000)
                    .map(coin => {
                        const ch = coin.price_change_percentage_24h || 0;
                        coin.rsi = Math.max(25, Math.min(78, 50 + (ch * 1.7) + (Math.random() * 10 - 5)));
                        return coin;
                    });

                filteredCoins = [...allCoins];
                currentPage = 1;
                renderHotSections();
                renderTable();
                renderPagination();
            } catch (e) {
                console.error(e);
                alert("Could not load full 500. Showing top 250.");
            }
        }

        function getSignal(coin) {
            const ch = coin.price_change_percentage_24h || 0;
            if (ch > 7) return { text: "STRONG LONG", cls: "text-emerald-400 font-bold", isLong: true, isStrong: true };
            if (ch > 4) return { text: "LONG", cls: "text-emerald-400", isLong: true, isStrong: false };
            if (ch < -7) return { text: "STRONG SHORT", cls: "text-red-400 font-bold", isLong: false, isStrong: true };
            if (ch < -4) return { text: "SHORT", cls: "text-red-400", isLong: false, isStrong: false };
            return { text: "NEUTRAL", cls: "text-gray-400", isLong: null, isStrong: false };
        }

        function renderHotSections() {
            const sorted = [...allCoins].sort((a, b) => Math.abs(b.price_change_percentage_24h || 0) - Math.abs(a.price_change_percentage_24h || 0));

            const longs = sorted.filter(c => getSignal(c).isLong === true).slice(0,8);
            const shorts = sorted.filter(c => getSignal(c).isLong === false).slice(0,8);

            document.getElementById('hot-longs').innerHTML = longs.map(coin => createHotCard(coin, true)).join('');
            document.getElementById('hot-shorts').innerHTML = shorts.map(coin => createHotCard(coin, false)).join('');
        }

        function createHotCard(coin, isLong) {
            const ch = coin.price_change_percentage_24h || 0;
            const signal = getSignal(coin);
            const isStrong = signal.isStrong;

            return `
                <div onclick="showCoinDetail('${coin.id}')" class="hot-card bg-gray-900 border ${isLong ? 'border-emerald-500/40' : 'border-red-500/40'} ${isStrong ? (isLong ? 'strong-glow' : 'strong-glow-short') : ''} rounded-3xl p-6 hover:border-white/60 transition-all cursor-pointer">
                    <div class="flex items-center gap-4">
                        <img src="${coin.image}" class="w-12 h-12 rounded-2xl">
                        <div class="flex-1">
                            <div class="font-bold">${coin.symbol.toUpperCase()}</div>
                            <div class="text-xs text-gray-400">${coin.name}</div>
                        </div>
                    </div>
                    <div class="mt-6 flex justify-between items-end">
                        <div>
                            <div class="font-mono text-2xl">$${coin.current_price.toLocaleString()}</div>
                            <div class="${isLong ? 'text-emerald-400' : 'text-red-400'}">${isLong ? '↑' : '↓'} ${Math.abs(ch).toFixed(1)}%</div>
                        </div>
                        <span class="px-5 py-2 text-sm font-bold rounded-2xl ${isLong ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}">
                            ${signal.text.replace("STRONG ", "")}
                        </span>
                    </div>
                </div>
            `;
        }

        function renderTable() {
            const start = (currentPage - 1) * coinsPerPage;
            const end = start + coinsPerPage;
            const pageCoins = filteredCoins.slice(start, end);

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            pageCoins.forEach((coin, idx) => {
                const signal = getSignal(coin);
                const ch = coin.price_change_percentage_24h || 0;
                const row = document.createElement('tr');
                row.className = `coin-row cursor-pointer hover:bg-gray-800 transition-colors`;
                row.innerHTML = `
                    <td class="p-5 text-gray-400">${start + idx + 1}</td>
                    <td class="p-5 flex items-center gap-4">
                        <img src="${coin.image}" class="w-9 h-9 rounded-2xl">
                        <div>
                            <div class="font-semibold">${coin.symbol.toUpperCase()}</div>
                            <div class="text-xs text-gray-400">${coin.name}</div>
                        </div>
                    </td>
                    <td class="p-5 text-right font-mono">$${coin.current_price.toLocaleString()}</td>
                    <td class="p-5 text-right font-medium ${ch >= 0 ? 'text-emerald-400' : 'text-red-400'}">${ch.toFixed(2)}%</td>
                    <td class="p-5 text-right font-mono ${coin.rsi > 70 ? 'text-red-400' : coin.rsi < 30 ? 'text-emerald-400' : ''}">${coin.rsi.toFixed(0)}</td>
                    <td class="p-5 text-right font-mono text-sm">$${(coin.total_volume/1e9).toFixed(2)}B</td>
                    <td class="p-5 text-right font-mono text-sm">$${(coin.market_cap/1e9).toFixed(2)}B</td>
                    <td class="p-5 text-center"><span class="${signal.cls}">${signal.text}</span></td>
                `;
                row.onclick = () => showCoinDetail(coin.id);
                tbody.appendChild(row);
            });

            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredCoins.length / coinsPerPage);
            const container = document.getElementById('pagination');
            container.innerHTML = '';

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 mx-1 rounded-xl ${i === currentPage ? 'bg-violet-600 text-white' : 'bg-gray-800 hover:bg-gray-700'}`;
                btn.textContent = i;
                btn.onclick = () => {
                    currentPage = i;
                    renderTable();
                };
                container.appendChild(btn);
            }
        }

        function showCoinDetail(coinId) {
            const coin = allCoins.find(c => c.id === coinId);
            if (!coin) return;

            const modal = document.getElementById('modal');
            modal.classList.remove('hidden');
            
            document.getElementById('modal-header').innerHTML = `
                <div class="flex items-center gap-4">
                    <img src="${coin.image}" class="w-12 h-12 rounded-2xl">
                    <div>
                        <div class="text-2xl font-bold">${coin.name}</div>
                        <div class="text-gray-400">${coin.symbol.toUpperCase()} • $${coin.current_price.toLocaleString()}</div>
                    </div>
                </div>
                <button onclick="closeModal()" class="text-4xl text-gray-400 hover:text-white">×</button>
            `;

            const ctx = document.getElementById('price-chart');
            if (priceChart) priceChart.destroy();
            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 24}, (_, i) => i + 'h'),
                    datasets: [{
                        data: generateMockPriceData(coin.current_price, coin.price_change_percentage_24h || 0),
                        borderColor: '#a5b4fc',
                        tension: 0.4,
                        borderWidth: 3
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: false } }}
            });

            const ch = coin.price_change_percentage_24h || 0;
            document.getElementById('modal-details').innerHTML = `
                <div><div class="text-gray-400">24h Change</div><div class="${ch >= 0 ? 'text-emerald-400' : 'text-red-400'} text-2xl">${ch.toFixed(2)}%</div></div>
                <div><div class="text-gray-400">RSI</div><div class="font-mono text-xl">${coin.rsi.toFixed(0)}</div></div>
            `;
        }

        function generateMockPriceData(current, change24h) {
            let price = current * (1 - change24h / 150);
            return Array.from({length: 24}, () => {
                price *= (1 + (Math.random() - 0.48) * 0.022);
                return price;
            });
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function filterTable() {
            const term = document.getElementById('search-input').value.toLowerCase();
            filteredCoins = allCoins.filter(c => 
                c.name.toLowerCase().includes(term) || c.symbol.toLowerCase().includes(term)
            );
            currentPage = 1;
            renderTable();
        }

        function sortTable(col) {
            let sorted = [...allCoins];
            const isAsc = currentSort.col === col ? !currentSort.asc : false;
            currentSort = { col, asc: isAsc };

            sorted.sort((a, b) => {
                let va, vb;
                switch(col) {
                    case 2: va = a.current_price; vb = b.current_price; break;
                    case 3: va = a.price_change_percentage_24h || 0; vb = b.price_change_percentage_24h || 0; break;
                    case 4: va = a.rsi || 50; vb = b.rsi || 50; break;
                    case 5: va = a.total_volume || 0; vb = b.total_volume || 0; break;
                    case 6: va = a.market_cap || 0; vb = b.market_cap || 0; break;
                    default: return 0;
                }
                return (va - vb) * (isAsc ? 1 : -1);
            });

            document.querySelectorAll('th').forEach((th, index) => {
                th.classList.remove('sort-asc', 'sort-desc');
                if (index === currentSort.col) th.classList.add(currentSort.asc ? 'sort-asc' : 'sort-desc');
            });

            allCoins = sorted;
            currentPage = 1;
            renderTable();
        }

        function refreshData() { fetchCryptoData(); }

        window.onload = fetchCryptoData;
    </script>
</body>
</html>
